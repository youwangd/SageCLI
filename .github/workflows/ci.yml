name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@test"
      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local
      - name: Install jq
        run: |
          if ! command -v jq &>/dev/null; then
            if [[ "$RUNNER_OS" == "Linux" ]]; then sudo apt-get install -y jq
            else brew install jq; fi
          fi
      - name: Run tests
        run: bats tests/
      - name: Coverage report
        run: tests/coverage.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint sage
        run: shellcheck --severity=error sage
